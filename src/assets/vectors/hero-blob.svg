<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 900 900"
  aria-hidden="true"
  focusable="false"
  style="overflow: visible;"
>
  <defs>
    <!-- Primary gradient: accent cold → accent secondary -->
    <radialGradient id="blob-grad-a" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#6ea8fe" stop-opacity="0.55" />
      <stop offset="60%" stop-color="#b58cff" stop-opacity="0.30" />
      <stop offset="100%" stop-color="#b58cff" stop-opacity="0" />
    </radialGradient>

    <!-- Secondary gradient: warm purple core -->
    <radialGradient id="blob-grad-b" cx="60%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#b58cff" stop-opacity="0.45" />
      <stop offset="70%" stop-color="#6ea8fe" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#6ea8fe" stop-opacity="0" />
    </radialGradient>

    <!-- Tertiary subtle orb: lower-right -->
    <radialGradient id="blob-grad-c" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6ea8fe" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#6ea8fe" stop-opacity="0" />
    </radialGradient>

    <filter id="blur-main" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="32" />
    </filter>
    <filter id="blur-secondary" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="48" />
    </filter>
    <filter id="blur-orb" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="56" />
    </filter>
  </defs>

  <!-- Orb C: bottom-right anchor -->
  <ellipse
    cx="660"
    cy="620"
    rx="200"
    ry="180"
    fill="url(#blob-grad-c)"
    filter="url(#blur-orb)"
    style="transform-origin: 660px 620px;"
  >
    <animateTransform
      attributeName="transform"
      type="scale"
      values="1;1.12;0.95;1"
      dur="11s"
      repeatCount="indefinite"
      calcMode="spline"
      keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"
    />
    <animate
      attributeName="opacity"
      values="0.7;1;0.6;0.7"
      dur="11s"
      repeatCount="indefinite"
      calcMode="spline"
      keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"
    />
  </ellipse>

  <!-- Blob B: right-center, larger, slower -->
  <path
    d="M560,200 C680,170 780,280 760,420 C740,560 620,620 500,600 C380,580 300,480 340,360 C380,240 440,230 560,200Z"
    fill="url(#blob-grad-b)"
    filter="url(#blur-secondary)"
    style="transform-origin: 530px 400px;"
  >
    <animateTransform
      attributeName="transform"
      type="rotate"
      values="0;8;-5;0"
      dur="18s"
      repeatCount="indefinite"
      calcMode="spline"
      keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"
    />
    <animate
      attributeName="d"
      values="
        M560,200 C680,170 780,280 760,420 C740,560 620,620 500,600 C380,580 300,480 340,360 C380,240 440,230 560,200Z;
        M590,220 C710,180 790,300 750,450 C710,580 590,630 460,600 C330,570 280,460 330,340 C380,220 470,260 590,220Z;
        M540,190 C660,155 770,270 745,415 C720,555 600,615 480,595 C360,575 295,470 345,355 C395,240 420,225 540,190Z;
        M560,200 C680,170 780,280 760,420 C740,560 620,620 500,600 C380,580 300,480 340,360 C380,240 440,230 560,200Z"
      dur="18s"
      repeatCount="indefinite"
      calcMode="spline"
      keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"
    />
  </path>

  <!-- Blob A: main, top-left, primary accent -->
  <path
    d="M300,140 C430,80 560,120 600,260 C640,400 580,520 460,560 C340,600 200,540 160,400 C120,260 170,200 300,140Z"
    fill="url(#blob-grad-a)"
    filter="url(#blur-main)"
    style="transform-origin: 380px 350px;"
  >
    <animateTransform
      attributeName="transform"
      type="rotate"
      values="0;-10;6;0"
      dur="14s"
      repeatCount="indefinite"
      calcMode="spline"
      keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"
    />
    <animate
      attributeName="d"
      values="
        M300,140 C430,80 560,120 600,260 C640,400 580,520 460,560 C340,600 200,540 160,400 C120,260 170,200 300,140Z;
        M320,120 C460,60 580,110 615,270 C650,420 580,540 445,565 C310,590 180,525 148,385 C116,245 180,180 320,120Z;
        M280,155 C415,95 545,130 585,275 C625,415 560,530 440,555 C320,580 195,510 158,370 C121,230 145,215 280,155Z;
        M300,140 C430,80 560,120 600,260 C640,400 580,520 460,560 C340,600 200,540 160,400 C120,260 170,200 300,140Z"
      dur="14s"
      repeatCount="indefinite"
      calcMode="spline"
      keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"
    />
  </path>
</svg>
