<svg
  xmlns="http://www.w3.org/2000/svg"
  style="display: none;"
  aria-hidden="true"
>
  <!--
    Sprite para sección Contact.
    Uso: <svg aria-hidden="true" width="20" height="20"><use href="#icon-email"/></svg>
    Todos los trazos usan currentColor, stroke-width 1.5, linecap/join round.
  -->

  <!-- Email / envelope -->
  <symbol id="icon-email" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="5" width="20" height="14" rx="2"/>
      <path d="M2 7l10 7 10-7"/>
    </g>
  </symbol>

  <!-- GitHub mark (simplified outline) -->
  <symbol id="icon-github" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 19c-4.3 1.4-4.3-2.5-6-3m12 5v-3.5c0-1 .1-1.4-.5-2 2.8-.3 5.5-1.4 5.5-6a4.6 4.6 0 00-1.3-3.2 4.2 4.2 0 00-.1-3.2s-1.1-.3-3.5 1.3a12.3 12.3 0 00-6.2 0C6.5 2.8 5.4 3.1 5.4 3.1a4.2 4.2 0 00-.1 3.2A4.6 4.6 0 004 9.5c0 4.6 2.7 5.7 5.5 6-.6.6-.6 1.2-.5 2V21"/>
    </g>
  </symbol>

  <!-- LinkedIn -->
  <symbol id="icon-linkedin" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="2" width="20" height="20" rx="4"/>
      <path d="M7 10v7"/>
      <path d="M11 10v7"/>
      <path d="M11 13a3 3 0 016 0v4"/>
      <circle cx="7" cy="7" r="1" fill="currentColor" stroke="none"/>
    </g>
  </symbol>

  <!-- External link arrow (para botones "ver en vivo") -->
  <symbol id="icon-external" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
      <path d="M15 3h6v6"/>
      <path d="M10 14L21 3"/>
    </g>
  </symbol>

  <!-- Arrow right (CTA nav) -->
  <symbol id="icon-arrow-right" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 12h14"/>
      <path d="M12 5l7 7-7 7"/>
    </g>
  </symbol>

  <!-- Close / X (for modal) -->
  <symbol id="icon-close" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 6L6 18"/>
      <path d="M6 6l12 12"/>
    </g>
  </symbol>

  <!-- Search -->
  <symbol id="icon-search" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="7"/>
      <path d="M21 21l-4.35-4.35"/>
    </g>
  </symbol>

  <!-- Chevron down (expand timeline) -->
  <symbol id="icon-chevron-down" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 9l6 6 6-6"/>
    </g>
  </symbol>

  <!-- Menu (hamburger mobile) -->
  <symbol id="icon-menu" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 6h16"/>
      <path d="M4 12h16"/>
      <path d="M4 18h16"/>
    </g>
  </symbol>

  <!-- Copy to clipboard -->
  <symbol id="icon-copy" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="9" y="9" width="13" height="13" rx="2"/>
      <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
    </g>
  </symbol>

  <!-- Check (success feedback) -->
  <symbol id="icon-check" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 6L9 17l-5-5"/>
    </g>
  </symbol>
</svg>
