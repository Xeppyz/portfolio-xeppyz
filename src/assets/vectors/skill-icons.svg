<svg
  xmlns="http://www.w3.org/2000/svg"
  style="display: none;"
  aria-hidden="true"
>
  <!--
    Sprite de iconos de skills. Uso: <svg aria-hidden="true"><use href="#icon-react"/></svg>
    Todos los paths usan currentColor para heredar el color del texto del contenedor.
    Stroke: 1.5px. Viewbox: 24×24.
  -->

  <!-- React -->
  <symbol id="icon-react" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <ellipse cx="12" cy="12" rx="2.4" ry="2.4"/>
      <ellipse cx="12" cy="12" rx="9" ry="3.6" transform="rotate(0 12 12)"/>
      <ellipse cx="12" cy="12" rx="9" ry="3.6" transform="rotate(60 12 12)"/>
      <ellipse cx="12" cy="12" rx="9" ry="3.6" transform="rotate(120 12 12)"/>
    </g>
  </symbol>

  <!-- TypeScript -->
  <symbol id="icon-typescript" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <path d="M10 12H7v1.5a1.5 1.5 0 003 0V12z"/>
      <path d="M14 12h3"/>
      <path d="M15.5 10v6"/>
    </g>
  </symbol>

  <!-- CSS / Tailwind -->
  <symbol id="icon-css" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 3l1.5 16L12 21l6.5-2L20 3H4z"/>
      <path d="M8 8h8l-.5 5L12 14.5 8.5 13z"/>
    </g>
  </symbol>

  <!-- SVG / Creative Code -->
  <symbol id="icon-creative" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 3C7.03 3 3 7.03 3 12s4.03 9 9 9 9-4.03 9-9"/>
      <path d="M16 3c0 3 2 4 5 4"/>
      <path d="M9 12l2 2 4-4"/>
    </g>
  </symbol>

  <!-- WebGL / Canvas -->
  <symbol id="icon-webgl" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="3" width="20" height="14" rx="2"/>
      <path d="M8 21h8"/>
      <path d="M12 17v4"/>
      <path d="M7 9l3 3-3 3"/>
      <path d="M13 15h4"/>
    </g>
  </symbol>

  <!-- Performance / Vite -->
  <symbol id="icon-performance" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M13 2L4.09 12.26a1 1 0 00.74 1.64H11l-1 8 8.91-10.26a1 1 0 00-.74-1.64H13l1-8z"/>
    </g>
  </symbol>

  <!-- Accessibility -->
  <symbol id="icon-a11y" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="4.5" r="1.5"/>
      <path d="M5 9h14"/>
      <path d="M12 9v6"/>
      <path d="M8 21l4-6 4 6"/>
    </g>
  </symbol>

  <!-- Design Systems -->
  <symbol id="icon-design" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="7" height="7" rx="1"/>
      <rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/>
      <path d="M17.5 14v7M14 17.5h7"/>
    </g>
  </symbol>

  <!-- Testing -->
  <symbol id="icon-testing" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/>
    </g>
  </symbol>

  <!-- Git / Version Control -->
  <symbol id="icon-git" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="6" cy="6" r="2"/>
      <circle cx="18" cy="6" r="2"/>
      <circle cx="6" cy="18" r="2"/>
      <path d="M6 8v8"/>
      <path d="M8 6h6a2 2 0 012 2v4a2 2 0 01-2 2H6"/>
    </g>
  </symbol>

  <!-- Animation -->
  <symbol id="icon-animation" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 12c0-3.87 3.13-7 7-7"/>
      <path d="M19 12c0 3.87-3.13 7-7 7"/>
      <path d="M9 12l3-3 3 3"/>
      <path d="M12 9v6"/>
    </g>
  </symbol>
</svg>
