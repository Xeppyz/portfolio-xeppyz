<svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tecno Smart Learning — ciberseguridad">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6ea8fe"/>
      <stop offset="100%" stop-color="#b58cff"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#b58cff" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#b58cff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="640" height="360" fill="#0b0d12"/>
  <rect width="640" height="360" fill="url(#glow)"/>

  <!-- Shield (seguridad) -->
  <g transform="translate(320 180)">
    <path d="M0 -96 L84 -64 V8 C84 64 44 96 0 116 C-44 96 -84 64 -84 8 V-64 Z"
          fill="none" stroke="url(#grad)" stroke-width="6" stroke-linejoin="round"/>
    <!-- Keyhole (acceso seguro) -->
    <circle cx="0" cy="-14" r="20" fill="none" stroke="url(#grad)" stroke-width="6"/>
    <path d="M0 6 V40" stroke="url(#grad)" stroke-width="6" stroke-linecap="round"/>
    <!-- Check spark -->
    <path d="M-26 -6 L-10 12 L30 -34" fill="none" stroke="#6ea8fe" stroke-width="5"
          stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.0"/>
  </g>

  <!-- Graduation cap (educación) -->
  <g transform="translate(150 112)" stroke="#ffffff" stroke-opacity="0.5" stroke-width="5" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <path d="M-44 0 L0 -22 L44 0 L0 22 Z"/>
    <path d="M28 8 V30 C28 40 -28 40 -28 30 V8"/>
    <path d="M44 0 V26"/>
  </g>

  <!-- Interactive nodes (dinámicas) -->
  <g fill="url(#grad)">
    <circle cx="490" cy="96" r="6"/>
    <circle cx="522" cy="140" r="4"/>
    <circle cx="470" cy="150" r="3"/>
  </g>
  <path d="M490 96 L522 140 M490 96 L470 150" stroke="#6ea8fe" stroke-opacity="0.4" stroke-width="2"/>
</svg>
