<svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Backend en Go">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#6ea8fe"/><stop offset="100%" stop-color="#b58cff"/></linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="60%"><stop offset="0%" stop-color="#6ea8fe" stop-opacity="0.24"/><stop offset="100%" stop-color="#6ea8fe" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="640" height="360" fill="#0b0d12"/>
  <rect width="640" height="360" fill="url(#glow)"/>

  <!-- Server stack -->
  <g transform="translate(150 96)">
    <rect x="0" y="0" width="150" height="46" rx="10" fill="none" stroke="url(#grad)" stroke-width="5"/>
    <rect x="0" y="60" width="150" height="46" rx="10" fill="none" stroke="url(#grad)" stroke-width="5"/>
    <rect x="0" y="120" width="150" height="46" rx="10" fill="none" stroke="url(#grad)" stroke-width="5"/>
    <circle cx="24" cy="23" r="5" fill="url(#grad)"/><circle cx="24" cy="83" r="5" fill="url(#grad)"/><circle cx="24" cy="143" r="5" fill="url(#grad)"/>
    <rect x="44" y="18" width="80" height="10" rx="5" fill="#ffffff" fill-opacity="0.14"/>
    <rect x="44" y="78" width="80" height="10" rx="5" fill="#ffffff" fill-opacity="0.14"/>
    <rect x="44" y="138" width="80" height="10" rx="5" fill="#ffffff" fill-opacity="0.14"/>
  </g>

  <!-- GO wordmark + speed -->
  <text x="400" y="200" fill="url(#grad)" font-family="Segoe UI, sans-serif" font-size="96" font-weight="800" letter-spacing="-4">go</text>
  <g stroke="#6ea8fe" stroke-width="6" stroke-linecap="round" stroke-opacity="0.7">
    <path d="M372 150 H420"/><path d="M360 178 H410"/><path d="M372 206 H420"/>
  </g>
</svg>
