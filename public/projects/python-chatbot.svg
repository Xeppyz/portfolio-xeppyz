<svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Chatbot en Python">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#6ea8fe"/><stop offset="100%" stop-color="#b58cff"/></linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%"><stop offset="0%" stop-color="#6ea8fe" stop-opacity="0.24"/><stop offset="100%" stop-color="#6ea8fe" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="640" height="360" fill="#0b0d12"/>
  <rect width="640" height="360" fill="url(#glow)"/>

  <!-- Bot avatar bubble -->
  <g transform="translate(150 120)">
    <rect x="0" y="0" width="120" height="100" rx="24" fill="none" stroke="url(#grad)" stroke-width="6"/>
    <circle cx="40" cy="46" r="10" fill="url(#grad)"/>
    <circle cx="80" cy="46" r="10" fill="url(#grad)"/>
    <path d="M40 74 H80" stroke="url(#grad)" stroke-width="5" stroke-linecap="round"/>
    <path d="M60 -20 V0" stroke="url(#grad)" stroke-width="5" stroke-linecap="round"/>
    <circle cx="60" cy="-24" r="6" fill="url(#grad)"/>
    <path d="M30 100 L46 100 L38 116 Z" fill="url(#grad)"/>
  </g>

  <!-- Chat bubbles -->
  <g font-family="Segoe UI, sans-serif" font-size="14">
    <rect x="330" y="108" width="180" height="40" rx="14" fill="#11141b"/>
    <text x="348" y="133" fill="#aab2c5">Hola, ¿en qué te ayudo?</text>
    <rect x="350" y="158" width="160" height="40" rx="14" fill="url(#grad)"/>
    <text x="370" y="183" fill="#0b0d12" font-weight="600">Estado de mi orden</text>
    <rect x="330" y="208" width="200" height="40" rx="14" fill="#11141b"/>
    <text x="348" y="233" fill="#aab2c5">Tu orden está en curso ✓</text>
  </g>

  <text x="330" y="284" fill="#6ea8fe" font-family="Segoe UI, sans-serif" font-size="20" font-weight="800">Python</text>
</svg>
